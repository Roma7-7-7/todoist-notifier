version: 2
updates:
  # Docker base images
  # gomod/github-actions rely on Dependabot security updates
  # (enabled in repo Settings -> Code security) for vulnerability-only PRs.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
      include: "scope"
